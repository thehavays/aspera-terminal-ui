name: aspera-terminal-ui
base: core22
version: '1.0.3'
title: Aspera Terminal UI
icon: snap/gui/icon.png
summary: Aspera Terminal UI for P2P and MySpace file transfers
description: |
  atui is a powerful command-line interface for managing Aspera file transfers.
  It allows users to list, download, and share files across Aspera P2P and MySpace systems
  with a rich interactive terminal UI.

license: MIT
contact: https://github.com/thehavays/aspera-terminal-ui/issues
issues: https://github.com/thehavays/aspera-terminal-ui/issues
source-code: https://github.com/thehavays/aspera-terminal-ui
website: https://github.com/thehavays/aspera-terminal-ui

grade: stable
confinement: strict

apps:
  atui:
    command: bin/atui
    plugs:
      - network
      - network-bind
      - home
      - password-manager-service

parts:
  atui:
    plugin: go
    source: .
    build-snaps:
      - go
    build-packages:
      - libsecret-1-dev
      - pkg-config
    stage-packages:
      - libsecret-1-0
    override-build: |
      snapcraftctl build
      if [ -f $SNAPCRAFT_PART_INSTALL/bin/aspera-terminal-ui ]; then
        mv $SNAPCRAFT_PART_INSTALL/bin/aspera-terminal-ui $SNAPCRAFT_PART_INSTALL/bin/atui
      fi
